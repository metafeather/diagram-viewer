version: 3

tasks:
  default: task --list-all

  env: env | sort

  build:
    desc: Bundle src/ into dist/
    cmds:
      - go tool esbuild src/diagram-viewer.js --bundle --format=esm --target=es2022 --loader:.css=text --outfile=dist/diagram-viewer.js

  dev:
    desc: Watch src/ and rebuild on change
    cmds:
      - go tool esbuild src/diagram-viewer.js --bundle --format=esm --target=es2022 --loader:.css=text --outfile=dist/diagram-viewer.js --watch

  test:
    desc: Run Playwright end-to-end tests
    deps: [build]
    cmds:
      - go test ./tests/... -v -timeout 120s

  serve:
    desc: Serve index.html with Caddy (no CORS restrictions)
    deps: [build]
    cmds:
      - go tool caddy run --config Caddyfile

  manifest:example:
    desc: Run manifest tool against examples/kubernetes.d2/
    cmds:
      - go tool manifest --in examples/kubernetes.d2/ --format d2 -- --theme 200 --layout elk --sketch

  manifest:regen-golden:
    desc: Regenerate the golden file for the manifest integration test
    cmds:
      - go tool manifest --in examples/kubernetes.d2/ --format d2 -- --theme 200 --layout elk --sketch > cmd/manifest/testdata/kubernetes.golden.json

  release-hashes:
    desc: Compute SRI hashes for dist/diagram-viewer.js and verify against jsDelivr CDN
    deps: [build]
    vars:
      TAG: '{{.TAG | default ""}}'
    cmds:
      - |
        set -euo pipefail
        FILE="dist/diagram-viewer.js"
        TAG="{{.TAG}}"
        if [ -z "$TAG" ]; then
          TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "")"
        fi
        if [ -z "$TAG" ]; then
          echo "ERROR: No tag provided and none found via git describe." >&2
          exit 1
        fi

        # Compute SRI digests
        SHA384=$(openssl dgst -sha384 -binary "$FILE" | openssl base64 -A)
        SHA256=$(openssl dgst -sha256 -binary "$FILE" | openssl base64 -A)
        echo ""
        echo "SRI hashes for $FILE (tag: $TAG):"
        echo "  sha384-${SHA384}"
        echo "  sha256-${SHA256}"
        echo ""

        # Verify against CDN
        CDN_URL="https://cdn.jsdelivr.net/gh/metafeather/diagram-viewer@${TAG}/dist/diagram-viewer.js"
        echo "Fetching $CDN_URL ..."
        TMPFILE=$(mktemp)
        trap 'rm -f "$TMPFILE"' EXIT
        HTTP_CODE=$(curl -sS -o "$TMPFILE" -w "%{http_code}" "$CDN_URL")
        if [ "$HTTP_CODE" != "200" ]; then
          echo "ERROR: CDN returned HTTP $HTTP_CODE" >&2
          exit 1
        fi

        CDN_SHA384=$(openssl dgst -sha384 -binary "$TMPFILE" | openssl base64 -A)
        if [ "$CDN_SHA384" != "$SHA384" ]; then
          echo "ERROR: CDN file does NOT match local build!" >&2
          echo "  Local:  sha384-${SHA384}" >&2
          echo "  CDN:    sha384-${CDN_SHA384}" >&2
          exit 1
        fi
        echo "✓ CDN file matches local build (sha384 verified)."

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/
